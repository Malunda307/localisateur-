<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#05050d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Application de géolocalisation en temps réel">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Localise-moi | GPS</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --bg: #05050d; --surface: #0d0d1a; --card: #12122a; --primary: #6c5ce7; --primary-dark: #5a4bd1; --text: #e8e8f0; --text-dim: #8888aa; --success: #00e676; --danger: #ff5252; --radius: 16px; --shadow: 0 8px 32px rgba(0,0,0,.45); }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; }
body { padding: 20px; min-height: 100vh; }
.status-bar { position: fixed; top:0; left:0; right:0; z-index:100; padding:8px 16px; font-size:12px; display:flex; justify-content:space-between; align-items:center; background:var(--surface); border-bottom:1px solid rgba(108,92,231,.15); color:var(--text-dim); }
.status-bar .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; }
.status-bar .dot.online { background:var(--success); box-shadow:0 0 8px var(--success); }
.status-bar .dot.offline { background:var(--danger); box-shadow:0 0 8px var(--danger); }
.card { background:var(--card); border-radius:var(--radius); padding:32px 28px; width:100%; max-width:440px; box-shadow:var(--shadow); border:1px solid rgba(108,92,231,.1); backdrop-filter:blur(12px); transition:transform .2s ease; }
h1 { font-size:26px; font-weight:700; text-align:center; letter-spacing:-.5px; margin-bottom:4px; background:linear-gradient(135deg,#6c5ce7,#a29bfe); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.subtitle { text-align:center; color:var(--text-dim); font-size:14px; margin-bottom:28px; }
.coord-grid { display:grid; gap:12px; margin-bottom:28px; }
.coord-item { background:var(--surface); border-radius:12px; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(108,92,231,.08); }
.coord-item .label { color:var(--text-dim); font-size:13px; text-transform:uppercase; letter-spacing:.5px; }
.coord-item .value { font-family:'SF Mono','Fira Code','Cascadia Code',monospace; font-size:18px; font-weight:600; color:#fff; }
.btn-group { display:flex; gap:12px; flex-wrap:wrap; }
.btn { flex:1; min-width:120px; padding:14px 20px; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s ease; display:inline-flex; align-items:center; justify-content:center; gap:8px; }
.btn-primary { background:linear-gradient(135deg,#6c5ce7,#5a4bd1); color:#fff; box-shadow:0 4px 16px rgba(108,92,231,.3); }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(108,92,231,.45); }
.btn-primary:active { transform:translateY(0); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-danger { background:rgba(255,82,82,.15); color:var(--danger); border:1px solid rgba(255,82,82,.2); }
.btn-danger:hover { background:rgba(255,82,82,.25); }
.btn-outline { background:transparent; color:var(--text); border:1px solid rgba(108,92,231,.2); }
.btn-outline:hover { background:rgba(108,92,231,.1); border-color:rgba(108,92,231,.4); }
.footer { margin-top:24px; text-align:center; color:var(--text-dim); font-size:12px; opacity:.7; }
.hidden { display:none !important; }
.loading { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
@media(max-width:480px) { .card { padding:24px 18px; } h1 { font-size:22px; } .coord-item .value { font-size:15px; } }
</style>
</head>
<body>

<div class="status-bar" id="statusBar">
  <span><span class="dot online" id="statusDot"></span><span id="statusText">Prêt pour la détection</span></span>
  <span id="timeDisplay">--:--</span>
</div>

<div class="card">
  <h1>📍 Localise-moi</h1>
  <p class="subtitle">Géolocalisation en temps réel</p>

  <div class="coord-grid">
    <div class="coord-item"><span class="label">LAT</span><span class="value" id="lat">—</span></div>
    <div class="coord-item"><span class="label">LNG</span><span class="value" id="lng">—</span></div>
    <div class="coord-item"><span class="label">PRÉCISION</span><span class="value" id="accuracy">—</span></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="startBtn">📍 ACTIVER</button>
    <button class="btn btn-outline" id="mapsBtn" disabled>🗺️ Google Maps</button>
    <button class="btn btn-danger hidden" id="stopBtn">⏹ Arrêter</button>
  </div>

  <div class="footer">© Localise-moi · Toutes les données restent sur ton appareil</div>
</div>

<script>
const startBtn=document.getElementById('startBtn');
const stopBtn=document.getElementById('stopBtn');
const mapsBtn=document.getElementById('mapsBtn');
const latEl=document.getElementById('lat');
const lngEl=document.getElementById('lng');
const accEl=document.getElementById('accuracy');
const statusText=document.getElementById('statusText');
const statusDot=document.getElementById('statusDot');
const timeDisplay=document.getElementById('timeDisplay');

let watchId=null;
let currentLat=null, currentLng=null;

function updateTime(){const d=new Date();timeDisplay.textContent=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
setInterval(updateTime,10000);
updateTime();

// Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

// Detection en ligne/hors ligne
function updateOnlineStatus(){
  if(navigator.onLine){
    statusDot.className='dot online';
    statusText.textContent=watchId!==null?'Réception GPS active':'Prêt pour la détection';
  } else {
    statusDot.className='dot offline';
    statusText.textContent='Hors ligne — données mises en cache';
  }
}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);

function startGPS(){
  if(!navigator.geolocation){alert('La géolocalisation n\'est pas supportée par votre navigateur.');return;}
  startBtn.disabled=true;
  startBtn.innerHTML='<span class="loading"></span> Détection...';

  watchId=navigator.geolocation.watchPosition(
    pos=>{
      currentLat=pos.coords.latitude;
      currentLng=pos.coords.longitude;
      const acc=pos.coords.accuracy;

      latEl.textContent=currentLat.toFixed(6);
      lngEl.textContent=currentLng.toFixed(6);
      accEl.textContent=acc<1?'< 1 m':Math.round(acc)+' m';

      startBtn.innerHTML='📍 ACTIVER';
      startBtn.disabled=false;
      stopBtn.classList.remove('hidden');
      mapsBtn.disabled=false;
      statusText.textContent='Réception GPS active';

      // Stocker en local
      try{localStorage.setItem('lastLat',currentLat);localStorage.setItem('lastLng',currentLng);localStorage.setItem('lastTime',new Date().toISOString());}catch(e){}
    },
    err=>{
      let msg='';
      switch(err.code){
        case err.PERMISSION_DENIED:msg='Permission refusée. Autorisez la localisation dans les paramètres.';break;
        case err.POSITION_UNAVAILABLE:msg='Position indisponible.';break;
        case err.TIMEOUT:msg='Délai dépassé. Essayez encore.';break;
        default:msg='Erreur inconnue.';
      }
      alert(msg);
      startBtn.innerHTML='📍 ACTIVER';
      startBtn.disabled=false;
      stopBtn.classList.add('hidden');
      statusText.textContent='Erreur de localisation';
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

function stopGPS(){
  if(watchId!==null){
    navigator.geolocation.clearWatch(watchId);
    watchId=null;
  }
  startBtn.disabled=false;
  startBtn.innerHTML='📍 ACTIVER';
  stopBtn.classList.add('hidden');
  mapsBtn.disabled=true;
  statusText.textContent=navigator.onLine?'Prêt pour la détection':'Hors ligne';
}

function openMaps(){
  if(currentLat===null||currentLng===null) return;
  const url=`https://www.google.com/maps?q=${currentLat},${currentLng}`;
  window.open(url,'_blank');
}

function shareWhatsApp(){
  if(currentLat===null||currentLng===null){alert('Activez d\'abord la géolocalisation.');return;}
  const msg=`📍 Ma position actuelle : https://www.google.com/maps?q=${currentLat},${currentLng}`;
  const phone='243902319893;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}

startBtn.addEventListener('click',startGPS);
stopBtn.addEventListener('click',stopGPS);
mapsBtn.addEventListener('click',openMaps);

// Restaurer la dernière position depuis le localStorage
try{
  const lastLat=localStorage.getItem('lastLat');
  const lastLng=localStorage.getItem('lastLng');
  if(lastLat&&lastLng){
    latEl.textContent=parseFloat(lastLat).toFixed(6);
    lngEl.textContent=parseFloat(lastLng).toFixed(6);
  }
}catch(e){}

// État initial
updateOnlineStatus();

// Exposition pour le bouton WhatsApp (si tu veux l'ajouter)
window.shareWhatsApp=shareWhatsApp;
</script>
</body>
</html>
