<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#05050d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Localise-moi" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <!-- Content-Security-Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" />
  <title>Localise-moi | GPS</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #05050d; color: #fff; min-height: 100vh; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; overflow-x: hidden;
    }
    .status-bar {
      position: fixed; top: 0; left: 0; right: 0;
      background: #0a0a1a; padding: 10px 20px; display: flex;
      align-items: center; gap: 10px; font-size: 13px; border-bottom: 1px solid #1a1a2e;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #00f5a0; flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { color: #888; }
    .status-msg { color: #00f5a0; margin-left: auto; font-size: 12px; transition: color 0.3s; }
    .container {
      text-align: center; max-width: 400px; width: 100%; margin-top: 60px;
    }
    h1 {
      font-size: 28px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, #00f5a0, #00d9f5); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 40px; }
    .btn-primary {
      background: linear-gradient(135deg, #00f5a0, #00d9f5); border: none;
      color: #05050d; font-size: 18px; font-weight: 600; padding: 18px 48px;
      border-radius: 50px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      display: inline-flex; align-items: center; gap: 12px;
    }
    .btn-primary:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,245,160,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .data-panel {
      display: none; margin-top: 40px; padding: 30px; border-radius: 20px;
      background: #0a0a1a; border: 1px solid #1a1a2e;
    }
    .data-panel.active { display: block; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .coord-row {
      display: flex; justify-content: space-between; padding: 14px 0;
      border-bottom: 1px solid #1a1a2e; font-size: 18px;
    }
    .coord-row:last-child { border-bottom: none; }
    .coord-label { color: #888; }
    .coord-value { color: #fff; font-weight: 600; font-family: 'Courier New', monospace; }
    .precision-value { color: #00f5a0; }
    .actions { margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn-secondary {
      background: #1a1a2e; border: 1px solid #2a2a3e; color: #fff;
      padding: 12px 24px; border-radius: 12px; cursor: pointer; font-size: 14px;
      transition: background 0.2s; text-decoration: none;
    }
    .btn-secondary:hover { background: #2a2a3e; }
    .btn-danger {
      background: #ff4d6d20; border: 1px solid #ff4d6d; color: #ff4d6d;
      padding: 12px 24px; border-radius: 12px; cursor: pointer; font-size: 14px;
      transition: background 0.2s;
    }
    .btn-danger:hover { background: #ff4d6d30; }
    .footer { margin-top: 40px; color: #444; font-size: 12px; }
  </style>
</head>
<body>
  <div class="status-bar">
    <span class="status-dot"></span>
    <span class="status-text">System Online</span>
    <span class="status-msg" id="statusMsg">Prêt pour la détection</span>
  </div>

  <div class="container">
    <h1>Localise-moi</h1>
    <p class="subtitle">Géolocalisation en temps réel</p>

    <button class="btn-primary" id="btnDetect" disabled>
      <span id="btnIcon">📍</span>
      <span id="btnLabel">ACTIVER</span>
    </button>

    <div class="data-panel" id="dataPanel">
      <div class="coord-row">
        <span class="coord-label">LAT</span>
        <span class="coord-value" id="lat">—</span>
      </div>
      <div class="coord-row">
        <span class="coord-label">LNG</span>
        <span class="coord-value" id="lng">—</span>
      </div>
      <div class="coord-row">
        <span class="coord-label">PRÉCISION</span>
        <span class="coord-value precision-value" id="acc">—</span>
      </div>

      <div class="actions">
        <button class="btn-secondary" id="btnMaps">🗺️ Google Maps</button>
        <button class="btn-danger" id="btnStop">⏹ Arrêter</button>
      </div>
    </div>

    <div class="footer">© Localise-moi · Toutes les données restent sur ton appareil</div>
  </div>

  <script>
    // ═══════════════════════════════════════════
    //  CONFIGURATION — Modifie TON numéro ici
    // ═══════════════════════════════════════════
    var MON_NUMERO = "243902319893"; // ← mets ton numéro ici

    // ═══════════════════════════════════════════
    //  DOM
    // ═══════════════════════════════════════════
    var btn = document.getElementById('btnDetect');
    var btnIcon = document.getElementById('btnIcon');
    var btnLabel = document.getElementById('btnLabel');
    var dataPanel = document.getElementById('dataPanel');
    var elLat = document.getElementById('lat');
    var elLng = document.getElementById('lng');
    var elAcc = document.getElementById('acc');
    var statusMsg = document.getElementById('statusMsg');
    var btnMaps = document.getElementById('btnMaps');
    var btnStop = document.getElementById('btnStop');

    var watchId = null;
    var lastPosition = null;
    var isRunning = false;

    // ═══════════════════════════════════════════
    //  UTILITAIRES
    // ═══════════════════════════════════════════
    function updateStatus(msg, color) {
      statusMsg.textContent = msg;
      statusMsg.style.color = color || '#00f5a0';
    }

    // ═══════════════════════════════════════════
    //  GEOLOCALISATION
    // ═══════════════════════════════════════════
    function onSuccess(pos) {
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      var acc = pos.coords.accuracy;

      lastPosition = pos;

      btn.disabled = false;
      btnIcon.textContent = '✅';
      btnLabel.textContent = 'ENVOYÉ';

      elLat.textContent = lat.toFixed(5);
      elLng.textContent = lng.toFixed(5);
      elAcc.textContent = '± ' + Math.round(acc) + ' m';

      dataPanel.classList.add('active');
      updateStatus('Position trouvée !', '#00f5a0');

      // Ouvre WhatsApp avec la position
      var mapsUrl = 'https://www.google.com/maps?q=' + lat + ',' + lng + '&z=17';
      var message = '📍 *Localisation GPS*\n' +
                    'Date : ' + new Date().toLocaleString('fr-FR') + '\n' +
                    'Lat  : ' + lat.toFixed(6) + '\n' +
                    'Lng  : ' + lng.toFixed(6) + '\n' +
                    'Précision : ± ' + Math.round(acc) + ' m\n\n' +
                    '🗺 ' + mapsUrl;

      window.open('https://wa.me/' + MON_NUMERO + '?text=' + encodeURIComponent(message), '_blank');
      updateStatus('WhatsApp ouvert — envoie !', '#00f5a0');
    }

    function onError(err) {
      btn.disabled = false;
      btnIcon.textContent = '❌';
      btnLabel.textContent = 'RÉESSAYER';

      if (err.code === 1) updateStatus('GPS bloqué — autorise la localisation dans le navigateur', '#ff4d6d');
      else if (err.code === 2) updateStatus('Position introuvable — active le GPS du téléphone', '#ff4d6d');
      else updateStatus('Déclenché — réessaie en extérieur', '#ff4d6d');
    }

    function startGeolocation() {
      btn.disabled = true;
      btnIcon.textContent = '⏳';
      btnLabel.textContent = 'DÉTECTION...';
      updateStatus('Recherche du signal GPS...', '#ffaa00');

      // Vérifie que la géolocalisation est dispo
      if (!navigator.geolocation) {
        updateStatus('Géolocalisation non supportée par ce navigateur', '#ff4d6d');
        btn.disabled = false;
        btnIcon.textContent = '📍';
        btnLabel.textContent = 'ACTIVER';
        return;
      }

      // watchPosition avec timeout
      navigator.geolocation.getCurrentPosition(onSuccess, onError, {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      });
    }

    function stopGeolocation() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      isRunning = false;
      dataPanel.classList.remove('active');
      btn.disabled = false;
      btnIcon.textContent = '📍';
      btnLabel.textContent = 'ACTIVER';
      updateStatus('Géolocalisation arrêtée', '#888');
      lastPosition = null;
    }

    // ═══════════════════════════════════════════
    //  BOUTONS
    // ═══════════════════════════════════════════
    btn.addEventListener('click', function() {
      if (btnLabel.textContent === 'ENVOYÉ') {
        // Renvoyer avec la dernière position
        if (lastPosition) {
          onSuccess(lastPosition);
        }
      } else {
        startGeolocation();
      }
    });

    btnMaps.addEventListener('click', function() {
      if (!lastPosition) return;
      var lat = lastPosition.coords.latitude;
      var lng = lastPosition.coords.longitude;
      window.open('https://www.google.com/maps?q=' + lat + ',' + lng + '&z=17', '_blank');
    });

    btnStop.addEventListener('click', stopGeolocation);

    // ═══════════════════════════════════════════
    //  SERVICE WORKER — Enregistrement
    // ═══════════════════════════════════════════
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(function() { console.log('✓ Service Worker enregistré'); })
        .catch(function(err) { console.log('✗ Service Worker :', err); });
    }

    console.log('✓ App prête — numéro configuré : ' + MON_NUMERO);
  </script>
</body>
</html>
